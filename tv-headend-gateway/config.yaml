name: TV-Headend Gateway
version: "0.1.0"
slug: tv_headend_gateway
description: Konfiguration, Diagnose und Steuerung fuer das externe TV-Headend Gateway
url: https://github.com/PU-Brandt/TVheadend-Gateway
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
  armhf: ghcr.io/home-assistant/armhf-base:latest
  armv7: ghcr.io/home-assistant/armv7-base:latest
  i386: ghcr.io/home-assistant/i386-base:latest
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:television-guide
panel_title: TV-Headend Gateway
options:
  external_host: ""
  external_port: 8088
  api_base_path: "/api/v1"
  api_token: ""
  request_timeout_seconds: 30
schema:
  external_host: str
  external_port: port
  api_base_path: str
  api_token: password
  request_timeout_seconds: "int(5,120)"
